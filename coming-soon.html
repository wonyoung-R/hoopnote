<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>준비중 | HoopNote</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .wrap {
            max-width: 420px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #999;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #F4A261;
            color: #0a0a0a;
            font-weight: 600;
            font-size: 15px;
            border-radius: 10px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon">🏀</div>
        <h1>준비중입니다</h1>
        <p>HoopNote 서비스를 열심히 준비하고 있습니다.<br>조금만 기다려 주세요!</p>
        <a href="index.html" class="btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
